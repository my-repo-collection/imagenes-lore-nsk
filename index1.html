<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería de Imágenes</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        h1 {
            margin: 0;
            font-size: 2.8rem;
            color: #00ffcc;
        }

        .subtitle {
            color: #888;
            margin-top: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            aspect-ratio: 16 / 9;
        }

        .image-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            color: #fff;
            padding: 15px 12px 12px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }

        .gallery-item:hover .image-name {
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Mi Galería</h1>
        <p class="subtitle">Todas las imágenes de tu carpeta "img"</p>
    </header>

    <div class="gallery" id="gallery">
        <!-- Las imágenes se cargarán aquí con JavaScript -->
    </div>

    <!-- Modal para ver imagen grande -->
    <div class="modal" id="modal">
        <span class="close" onclick="closeModal()">×</span>
        <img class="modal-content" id="modalImage">
    </div>

    <footer>
        Galería generada automáticamente • {{current_year}}
    </footer>

    <script>
        // Lista de imágenes que copiaste de tu images.json
        const images = [

            "f2f3477f1994f4772f63b15e565b26a.jpg",
            "f84c935b973c53e66b29f8629251ab47.jpg"
        ];

        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modalImage');

        // Generar las tarjetas de la galería
        images.forEach(filename => {
            const div = document.createElement('div');
            div.className = 'gallery-item';

            div.innerHTML = `
        <img src="/img/${filename}" alt="${filename}" loading="lazy">
        <div class="image-name">${filename}</div>
      `;

            // Al hacer clic se abre el modal
            div.addEventListener('click', () => {
                modalImage.src = `img/${filename}`;
                modal.style.display = 'flex';
            });

            gallery.appendChild(div);
        });

        // Cerrar modal
        function closeModal() {
            modal.style.display = 'none';
        }

        // Cerrar modal al hacer clic fuera de la imagen
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Cerrar con tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>

</html>

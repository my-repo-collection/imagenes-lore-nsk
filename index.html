<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📸 Mi Galería</div>
            <ul>
                <li><a href="#hero">Inicio</a></li>
                <li><a href="#gallery">Galería</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Landing -->
    <section id="hero" class="hero">
        <div class="hero-content">
            <h1>Mi colección visual</h1>
            <p>Imágenes que voy agregando porque me gustan.<br></p>
            <a href="#gallery" class="btn-primary">Explorar galería</a>
        </div>
    </section>

    <!-- Galería -->
    <section id="gallery" class="gallery-section">
        <div class="container">
            <h2 class="section-title">Galería</h2>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>
    </section>

    <!-- Modal Lightbox -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-image" src="" alt="">
            <div class="modal-info">
                <h3 id="modal-title"></h3>
                <p id="modal-description"></p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 • Hecho para ordenar mi escritorio</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
